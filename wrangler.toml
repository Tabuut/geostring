name = "geostring"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
main = "dist/server/server.js"
assets = { directory = "dist/client" }

[alias]
"#tanstack-router-entry" = "./dist/server/assets/router-BiiIF6W-.js"
"#tanstack-start-entry" = "./dist/server/assets/start-D4mdwD77.js"
"#tanstack-start-plugin-adapters" = "./dist/server/assets/__23tanstack-start-plugin-adapters-Cwee5PKy.js"
"tanstack-start-manifest:v" = "./dist/server/assets/_tanstack-start-manifest_v-DEfUquzT.js"
"tanstack-start-injected-head-scripts:v" = "./dist/server/assets/_tanstack-start-manifest_v-DEfUquzT.js"

# ✅ إضافة المتغيرات - يقرأ من Cloudflare Secrets
[env.production]
vars = { GEMINI_API_KEY = "" }

[env.development]
vars = { GEMINI_API_KEY = "" }
